{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>Edit Contact Message - Arsha</title>

  <!-- Favicons -->
  <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
  <link href="{% static 'assets/img/apple-touch-icon.png' %}" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS -->
  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/aos/aos.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">

  <!-- Main CSS -->
  <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">

</head>

<body class="contact-edit-page">

  <!-- Header -->
  <header id="header" class="header d-flex align-items-center sticky-top">

    <div class="container-fluid container-xl position-relative d-flex align-items-center">

      <a href="{% url 'home' %}" class="logo d-flex align-items-center me-auto">
        <h1 class="sitename">Arsha</h1>
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="{% url 'home' %}">Home</a></li>
          <li><a href="{% url 'blog' %}">Blog</a></li>
          <li><a href="{% url 'contact_list' %}" class="active">Contact Messages</a></li>
        </ul>

        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

    </div>

  </header>

  <main class="main">

    <!-- Page Title -->
    <div class="page-title" data-aos="fade">

      <div class="container">

        <nav class="breadcrumbs">

          <ol>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'contact_list' %}">Contact Messages</a></li>
            <li class="current">Edit</li>
          </ol>

        </nav>

        <h1>Edit Contact Message</h1>

      </div>

    </div>

    <!-- Edit Form -->
    <section class="section">

      <div class="container" data-aos="fade-up">

        <div class="row justify-content-center">

          <div class="col-lg-8">

            <div class="card shadow-sm">

              <div class="card-header bg-primary text-white">

                <h4 class="mb-0">
                  <i class="bi bi-pencil-square"></i>
                  Edit Message
                </h4>

              </div>

              <div class="card-body p-4">

                <form method="POST">

                  {% csrf_token %}

                  <div class="mb-3">

                    <label class="form-label">
                      Name
                    </label>

                    <input
                      type="text"
                      class="form-control"
                      name="name"
                      value="{{ message.name }}"
                      required>

                  </div>

                  <div class="mb-3">

                    <label class="form-label">
                      Email
                    </label>

                    <input
                      type="email"
                      class="form-control"
                      name="email"
                      value="{{ message.email }}"
                      required>

                  </div>

                  <div class="mb-3">

                    <label class="form-label">
                      Subject
                    </label>

                    <input
                      type="text"
                      class="form-control"
                      name="subject"
                      value="{{ message.subject }}"
                      required>

                  </div>

                  <div class="mb-4">

                    <label class="form-label">
                      Message
                    </label>

                    <textarea
                      class="form-control"
                      name="message"
                      rows="7"
                      required>{{ message.message }}</textarea>

                  </div>

                  <div class="d-flex justify-content-between">

                    <a href="{% url 'contact_list' %}" class="btn btn-secondary">

                      <i class="bi bi-arrow-left"></i>

                      Back

                    </a>

                    <button type="submit" class="btn btn-success">

                      <i class="bi bi-check-circle"></i>

                      Save Changes

                    </button>

                  </div>

                </form>

              </div>

            </div>

          </div>

        </div>

      </div>

    </section>

  </main>

  <!-- Footer -->
  <footer id="footer" class="footer">

    <div class="container copyright text-center mt-4">

      <p>

        © <span>Copyright</span>

        <strong class="px-1 sitename">Arsha</strong>

        <span>All Rights Reserved</span>

      </p>

    </div>

  </footer>

  <a href="#" id="scroll-top"
     class="scroll-top d-flex align-items-center justify-content-center">

    <i class="bi bi-arrow-up-short"></i>

  </a>

  <!-- Vendor JS -->
  <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  <script src="{% static 'assets/vendor/aos/aos.js' %}"></script>
  <script src="{% static 'assets/vendor/glightbox/js/glightbox.min.js' %}"></script>
  <script src="{% static 'assets/vendor/swiper/swiper-bundle.min.js' %}"></script>

  <!-- Main JS -->
  <script src="{% static 'assets/js/main.js' %}"></script>

</body>

</html>
